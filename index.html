<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador ACLS - Megacodes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --teal-50: #ecfeff; --teal-100: #cffafe; --teal-200: #a5f3fc;
  --teal-300: #67e8f9; --teal-400: #22d3ee; --teal-500: #06b6d4;
  --teal-600: #0891b2; --teal-700: #0e7490; --teal-800: #155e75; --teal-900: #164e63;
  --blue-50: #eff6ff; --blue-100: #dbeafe; --blue-200: #bfdbfe;
  --blue-300: #93c5fd; --blue-400: #60a5fa; --blue-500: #3b82f6; --blue-600: #2563eb;
  --blue-700: #1d4ed8; --blue-800: #1e40af; --blue-900: #1e3a8a;
  --red-50: #fef2f2; --red-500: #ef4444; --red-600: #dc2626; --red-700: #b91c1c;
  --green-50: #f0fdf4; --green-500: #22c55e; --green-600: #16a34a;
  --amber-50: #fffbeb; --amber-500: #f59e0b; --amber-600: #d97706;
  --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-300: #cbd5e1;
  --gray-400: #94a3b8; --gray-500: #64748b; --gray-600: #475569; --gray-700: #334155;
  --gray-800: #1e293b; --gray-900: #0f172a;
  --radius: 12px; --radius-sm: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
  --transition: .3s cubic-bezier(.4,0,.2,1);
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
  min-height: 100vh; color: var(--gray-800); line-height: 1.6;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header {
  background: linear-gradient(135deg, var(--teal-700) 0%, var(--teal-800) 100%);
  color: white; padding: 24px 32px; border-radius: var(--radius);
  margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px; box-shadow: var(--shadow-lg);
}
.header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; }
.header h1 span { color: var(--teal-300); }
.header-sub { font-size: .85rem; opacity: .85; font-weight: 400; }
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
  border: none; border-radius: var(--radius-sm); font-family: inherit;
  font-size: .875rem; font-weight: 600; cursor: pointer;
  transition: var(--transition); text-decoration: none; line-height: 1.4;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--teal-600); color: white; }
.btn-primary:hover { background: var(--teal-700); }
.btn-secondary { background: white; color: var(--teal-700); border: 2px solid var(--teal-200); }
.btn-secondary:hover { background: var(--teal-50); border-color: var(--teal-400); }
.btn-ghost { background: rgba(255,255,255,.15); color: white; }
.btn-ghost:hover { background: rgba(255,255,255,.25); }
.btn-danger { background: var(--red-600); color: white; }
.btn-danger:hover { background: var(--red-700); }
.btn-success { background: var(--green-600); color: white; }
.btn-success:hover { background: var(--green-500); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.panel {
  background: white; border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 24px; margin-bottom: 20px; transition: var(--transition);
}
.panel-hidden { display: none; }
.scenario-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; margin-top: 16px;
}
.scenario-card {
  background: white; border: 2px solid var(--gray-200); border-radius: var(--radius);
  padding: 20px; cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden;
}
.scenario-card:hover { border-color: var(--teal-400); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.scenario-card:active { transform: translateY(0); }
.scenario-card.selected { border-color: var(--teal-600); background: var(--teal-50); }
.scenario-card .card-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--teal-100); color: var(--teal-700); font-weight: 700;
  font-size: .85rem; margin-bottom: 8px;
}
.scenario-card.selected .card-num { background: var(--teal-600); color: white; }
.scenario-card h3 { font-size: 1rem; margin-bottom: 4px; }
.scenario-card p { font-size: .82rem; color: var(--gray-500); line-height: 1.5; }
.scenario-card .phase-tags {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px;
}
.scenario-card .phase-tag {
  font-size: .7rem; padding: 2px 8px; border-radius: 99px;
  background: var(--blue-100); color: var(--blue-700); font-weight: 500;
}
.simulator-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
}
.simulator-header h2 { font-size: 1.15rem; font-weight: 700; }
.progress-container { margin-bottom: 20px; }
.progress-bar {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px;
}
.progress-step {
  flex: 1; min-width: 0; padding: 8px 12px; border-radius: var(--radius-sm);
  background: var(--gray-100); text-align: center; font-size: .78rem;
  font-weight: 500; color: var(--gray-400); transition: var(--transition);
  white-space: nowrap;
}
.progress-step.active { background: var(--teal-600); color: white; }
.progress-step.done { background: var(--teal-100); color: var(--teal-700); }
.progress-step .step-label { overflow: hidden; text-overflow: ellipsis; }
.monitor {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
  background: var(--gray-900); border-radius: var(--radius); padding: 20px 24px;
  margin-bottom: 20px; box-shadow: inset 0 2px 4px rgba(0,0,0,.3);
}
.vital { text-align: center; }
.vital .label { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-400); margin-bottom: 2px; }
.vital .value { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
.vital .value.hr { color: #22d3ee; }
.vital .value.bp { color: #fbbf24; }
.vital .value.spo2 { color: #34d399; }
.vital .value.rr { color: #a78bfa; }
.vital .unit { font-size: .65rem; color: var(--gray-500); margin-top: 1px; }
.rhythm-badge {
  display: inline-block; padding: 4px 14px; border-radius: 99px;
  font-size: .8rem; font-weight: 600; margin-top: 8px;
}
.rhythm-badge.critical { background: rgba(239,68,68,.2); color: #fca5a5; }
.rhythm-badge.warning { background: rgba(245,158,11,.2); color: #fcd34d; }
.rhythm-badge.stable { background: rgba(52,211,153,.2); color: #6ee7b7; }
.rhythm-strip {
  margin-top: 8px; height: 36px; overflow: hidden; border-radius: 4px;
}
.rhythm-strip svg { width: 100%; height: 100%; }
.phase-info {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}
.phase-number {
  width: 32px; height: 32px; border-radius: 50%; background: var(--teal-100);
  color: var(--teal-700); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85rem;
}
.phase-name { font-weight: 600; font-size: .95rem; color: var(--gray-700); }
.phase-status { font-size: .78rem; padding: 2px 10px; border-radius: 99px; font-weight: 500; }
.phase-status.pending { background: var(--gray-100); color: var(--gray-500); }
.phase-status.correct { background: var(--green-50); color: var(--green-600); }
.phase-status.wrong { background: var(--red-50); color: var(--red-600); }
.scenario-text {
  background: var(--gray-50); border-left: 4px solid var(--teal-400);
  padding: 16px 20px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 20px; font-size: .9rem; line-height: 1.7; color: var(--gray-700);
}
.question-area { margin-bottom: 16px; }
.question-area h3 {
  font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--gray-800);
}
.answer-input {
  width: 100%; min-height: 100px; padding: 14px 16px;
  border: 2px solid var(--gray-200); border-radius: var(--radius-sm);
  font-family: inherit; font-size: .9rem; line-height: 1.6;
  transition: var(--transition); resize: vertical; color: var(--gray-800);
  background: white;
}
.answer-input:focus {
  outline: none; border-color: var(--teal-400); box-shadow: 0 0 0 3px var(--teal-100);
}
.answer-input:disabled { background: var(--gray-50); cursor: not-allowed; }
.answer-action {
  display: flex; gap: 12px; align-items: center; margin-top: 12px; flex-wrap: wrap;
}
.spinner {
  display: none; width: 20px; height: 20px; border: 3px solid var(--gray-200);
  border-top-color: var(--teal-600); border-radius: 50%; animation: spin .6s linear infinite;
}
.spinner.active { display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.feedback {
  padding: 16px 20px; border-radius: var(--radius-sm); margin-bottom: 16px;
  display: none; border-left: 4px solid var(--gray-300);
}
.feedback.correct { display: block; background: var(--green-50); border-left-color: var(--green-500); }
.feedback.wrong { display: block; background: var(--red-50); border-left-color: var(--red-500); }
.feedback-title { font-weight: 700; font-size: .95rem; margin-bottom: 6px; }
.feedback.correct .feedback-title { color: var(--green-700); }
.feedback.wrong .feedback-title { color: var(--red-700); }
.feedback-text { font-size: .85rem; line-height: 1.7; color: var(--gray-700); }
.feedback-text .expected { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--gray-300); }
.feedback-text .expected strong { color: var(--gray-900); }
.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.completion {
  text-align: center; padding: 40px 20px;
}
.completion .score-circle {
  width: 120px; height: 120px; border-radius: 50%; display: inline-flex;
  align-items: center; justify-content: center; font-size: 2.4rem; font-weight: 800;
  border: 4px solid; margin-bottom: 20px;
}
.completion h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: var(--gray-800); }
.completion p { color: var(--gray-500); margin-bottom: 12px; }
.completion .score-details { font-size: .9rem; font-weight: 500; color: var(--gray-600); margin-bottom: 20px; }
.results-list { max-width: 500px; margin: 0 auto 24px; }
.result-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--gray-100);
  font-size: .85rem;
}
.result-item:last-child { border-bottom: none; }
.result-item .ri-name { color: var(--gray-700); }
.result-icon { font-weight: 700; }
.result-icon.pass { color: var(--green-600); }
.result-icon.fail { color: var(--red-600); }
.btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.anim-fade { animation: fadeIn .35s ease both; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.anim-slide { animation: slideIn .3s ease both; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
.ecg-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawEcg 2s ease forwards; }
@keyframes drawEcg { to { stroke-dashoffset: 0; } }
.ecg-line-loop { stroke-dasharray: 200; animation: drawEcgLoop 1.5s linear infinite; }
@keyframes drawEcgLoop { to { stroke-dashoffset: -400; } }
@media (max-width: 768px) {
  .container { padding: 12px; }
  .header { padding: 16px 20px; flex-direction: column; text-align: center; }
  .header h1 { font-size: 1.3rem; }
  .scenario-grid { grid-template-columns: 1fr; }
  .monitor { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
  .vital .value { font-size: 1.4rem; }
  .btn { padding: 8px 16px; font-size: .8rem; }
  .completion .score-circle { width: 100px; height: 100px; font-size: 2rem; }
}
@media (max-width: 480px) {
  .monitor { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px; }
  .vital .value { font-size: 1.2rem; }
  .progress-step .step-label { display: none; }
  .controls-row { flex-direction: column; align-items: stretch; }
  .controls-row .btn { justify-content: center; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <header class="header">
    <div>
      <h1>&#9883; Simulador <span>ACLS</span></h1>
      <div class="header-sub">Treinamento Interativo de Megacodes &mdash; Resposta livre com IA</div>
    </div>
    <button class="btn btn-ghost" onclick="setGroqConfig()" title="Configurar chave API">&#9881; API</button>
  </header>

  <div id="selectionPanel" class="panel">
    <div class="controls-row" style="margin-bottom:12px;">
      <h2 style="font-size:1.1rem;font-weight:700;">Escolha um Cen&aacute;rio</h2>
      <button class="btn btn-primary" onclick="startRandomScenario()">&#127922; Cen&aacute;rio Aleat&oacute;rio</button>
    </div>
    <div id="scenarioGrid" class="scenario-grid"></div>
  </div>

  <div id="simulatorPanel" class="panel panel-hidden">
    <div class="simulator-header">
      <h2 id="simTitle">Cen&aacute;rio</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="backToSelection()">&larr; Cen&aacute;rios</button>
        <button class="btn btn-danger" onclick="restartScenario()">&#8635; Reiniciar</button>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="monitor" id="monitor">
      <div class="vital"><div class="label">FC (bpm)</div><div class="value hr" id="vitalHr">--</div><div class="unit">bat/min</div></div>
      <div class="vital"><div class="label">PA (mmHg)</div><div class="value bp" id="vitalBp">--/--</div><div class="unit">sist/diast</div></div>
      <div class="vital"><div class="label">SpO2 (%)</div><div class="value spo2" id="vitalSpo2">--</div><div class="unit">satura&ccedil;&atilde;o</div></div>
      <div class="vital"><div class="label">FR (irpm)</div><div class="value rr" id="vitalRr">--</div><div class="unit">incurs&otilde;es</div></div>
      <div style="grid-column:1/-1;text-align:center;">
        <span class="rhythm-badge" id="rhythmBadge">---</span>
        <div class="rhythm-strip">
          <svg viewBox="0 0 400 40" preserveAspectRatio="none">
            <polyline id="ecgPolyline" class="ecg-line-loop ecg-line" points="0,20 400,20" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
    </div>

    <div class="phase-info" id="phaseInfo">
      <span class="phase-number" id="phaseNum">1</span>
      <span class="phase-name" id="phaseName">Fase</span>
      <span class="phase-status pending" id="phaseStatus">Pendente</span>
    </div>

    <div class="scenario-text anim-fade" id="scenarioText"></div>

    <div class="question-area anim-fade" id="questionArea">
      <h3 id="questionTitle"></h3>
      <textarea class="answer-input" id="answerInput" rows="4" placeholder="Digite sua resposta aqui (ex: 'Atropina 0,5 mg IV', 'Cardioversão sincronizada 100J', etc.)..."></textarea>
      <div class="answer-action">
        <button class="btn btn-success" id="submitBtn" onclick="submitAnswer()">&#9654; Enviar para IA</button>
        <div class="spinner" id="spinner"></div>
      </div>
    </div>

    <div class="feedback" id="feedback">
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>

    <button class="btn btn-primary" id="nextBtn" onclick="nextPhase()" style="display:none;">Pr&oacute;xima Fase &rarr;</button>
  </div>

  <div id="completionPanel" class="panel panel-hidden">
    <div class="completion anim-fade">
      <div class="score-circle" id="scoreCircle">0%</div>
      <h2 id="completionTitle">Cen&aacute;rio Conclu&iacute;do!</h2>
      <p id="completionMsg">Revise seu desempenho abaixo.</p>
      <div class="score-details" id="scoreDetails"></div>
      <div class="results-list" id="resultsList"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="restartScenario()">&#8635; Refazer Cen&aacute;rio</button>
        <button class="btn btn-secondary" onclick="backToSelection()">&larr; Outro Cen&aacute;rio</button>
      </div>
    </div>
  </div>
</div>

<script>
function getGroqApiKey() {
  let key = localStorage.getItem('groq_api_key');
  if (!key) {
    key = prompt('Digite sua chave de API Groq:');
    if (key) localStorage.setItem('groq_api_key', key);
  }
  return key;
}
function getGroqModel() { return localStorage.getItem('groq_model') || 'llama-3.3-70b-versatile'; }
function setGroqConfig() {
  const key = prompt('Nova chave de API Groq:', localStorage.getItem('groq_api_key') || '');
  if (key) localStorage.setItem('groq_api_key', key);
  const model = prompt('Modelo Groq (padrão: llama-3.3-70b-versatile):', getGroqModel());
  if (model) localStorage.setItem('groq_model', model);
}

const SCENARIOS = [
  {
    id: 1, name: 'Bradicardia > TVSP > AESP > Pós-PCR',
    desc: 'Bradicardia sintomática que progride para TV sem pulso, depois AESP, com retorno à circulação espontânea.',
    phases: [
      { label: 'Bradicardia', rhythm: 'Bradicardia Sinusal', hr: 42, bp: '78/44', spo2: 89, rr: 10,
        text: 'Paciente de 67 anos, sexo masculino, dá entrada no PS com tontura, hipotensão (78/44 mmHg) e frequência cardíaca de 42 bpm. Refere náusea e sensação de desmaio iminente. Monitorização cardíaca mostra bradicardia sinusal. SpO₂ 89% em ar ambiente.',
        question: 'Qual a PRIMEIRA conduta para bradicardia sintomática com hipotensão?',
        options: [
          'Administrar Atropina 0,5 mg IV em bolus',
          'Iniciar compressões torácicas imediatamente',
          'Administrar Amiodarona 300 mg IV',
          'Cardioversão sincronizada a 50J',
          'Iniciar infusão de Dopamina 5-20 mcg/kg/min'
        ],
        correct: 0,
        feedback: 'A atropina (0,5 mg IV a cada 3-5 min, máximo 3 mg) é a primeira linha para bradicardia sintomática. Deve-se também: O₂ suplementar, monitorização, acesso IV. Se atropina falhar, preparar marcapasso transcutâneo ou infusão de dopamina/epinefrina.'
      },
      { label: 'TVSP', rhythm: 'Taquicardia Ventricular sem Pulso', hr: 0, bp: '0/0', spo2: 0, rr: 0,
        text: 'O paciente perdeu o pulso subitamente! O monitor mostra taquicardia ventricular sem pulso (TVSP). A equipe de ressuscitação está completa. Inicie as manobras de RCP imediatamente.',
        question: 'Qual a conduta prioritária na TVSP (TV sem pulso)?',
        options: [
          'Administrar Adenosina 6 mg IV',
          'Desfibrilação com 120-200J bifásico + RCP por 2 min',
          'Iniciar infusão de Lidocaína 1,5 mg/kg',
          'Realizar cardioversão química com Amiodarona',
          'Iniciar marca-passo transcutâneo'
        ],
        correct: 1,
        feedback: 'Na TVSP/FV, a prioridade é desfibrilação precoce (120-200J bifásico) seguida imediatamente de RCP por 2 min. Após o 2º choque, administrar epinefrina 1 mg a cada 3-5 min. Após o 3º choque, amiodarona 300 mg IV.'
      },
      { label: 'AESP', rhythm: 'Atividade Elétrica sem Pulso', hr: 65, bp: '0/0', spo2: 0, rr: 0,
        text: 'Após 3 ciclos de RCP e desfibrilação, o ritmo agora mostra atividade elétrica sem pulso (AESP) com frequência de 65 bpm. Não há pulso palpável. A via aérea avançada foi estabelecida.',
        question: 'Na AESP, a prioridade imediata é:',
        options: [
          'Administrar mais 300 mg de Amiodarona',
          'Realizar nova desfibrilação com 200J',
          'Administrar Epinefrina 1 mg IV e investigar Hs & Ts',
          'Iniciar infusão de Bicarbonato de Sódio',
          'Realizar cardioversão sincronizada'
        ],
        correct: 2,
        feedback: 'Na AESP, o tratamento principal é epinefrina 1 mg IV a cada 3-5 min + RCP de alta qualidade + identificar e tratar causas reversíveis (Hs & Ts). NÃO desfibrilar ritmos organizados!'
      },
      { label: 'Pós-PCR', rhythm: 'Ritmo Sinusal', hr: 88, bp: '118/72', spo2: 96, rr: 14,
        text: 'O paciente recuperou pulso e circulação espontânea! PA 118/72 mmHg, FC 88 bpm, SpO₂ 96% com O₂ suplementar. Ritmo sinusal no monitor. Agora inicia-se a fase de cuidados pós-parada cardíaca.',
        question: 'Nos cuidados pós-PCR (ROSC), qual conduta NÃO está indicada?',
        options: [
          'Realizar ECG de 12 derivações',
          'Avaliar necessidade de cateterismo cardíaco de emergência',
          'Iniciar hipotermia terapêutica (TTM) entre 32-36°C',
          'Administrar Heparina em bolus 5000 UI profilática',
          'Monitorizar capnografia e manter PaCO₂ adequada'
        ],
        correct: 3,
        feedback: 'Heparina profilática em bolus NÃO é indicada na rotina pós-PCR. As condutas indicadas incluem: ECG 12 derivações, capnografia, TTM (32-36°C), avaliar IAM/cateterismo, otimizar ventilação, tratar causa base.'
      }
    ]
  },

};

function renderScenarioGrid() {
  const grid = document.getElementById('scenarioGrid');
  grid.innerHTML = '';
  SCENARIOS.forEach((s, i) => {
    const phases = s.phases.map(p => `<span class="phase-tag">${p.label}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'scenario-card' + (state.scenarioSelection === i ? ' selected' : '');
    card.innerHTML = `<div class="card-num">${s.id}</div>
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
      <div class="phase-tags">${phases}</div>`;
    card.onclick = () => selectScenario(i);
    grid.appendChild(card);
  });
}

function selectScenario(idx) {
  state.scenarioSelection = idx;
  document.querySelectorAll('.scenario-card').forEach((c, i) => {
    c.classList.toggle('selected', i === idx);
  });
  startSelectedScenario();
}

function startSelectedScenario() {
  if (state.scenarioSelection === null) return;
  startScenario(state.scenarioSelection);
}

function startRandomScenario() {
  const idx = Math.floor(Math.random() * SCENARIOS.length);
  state.scenarioSelection = idx;
  renderScenarioGrid();
  startScenario(idx);
}

function startScenario(idx) {
  state.currentScenario = SCENARIOS[idx];
  state.currentPhase = 0;
  state.answers = [];
  state.submitted = false;
  state.completed = false;

  document.getElementById('selectionPanel').classList.add('panel-hidden');
  document.getElementById('simulatorPanel').classList.remove('panel-hidden');
  document.getElementById('completionPanel').classList.add('panel-hidden');

  document.getElementById('simTitle').textContent = 'Cenário ' + state.currentScenario.id + ': ' + state.currentScenario.name;
  renderPhase();
}

function renderPhase() {
  const scenario = state.currentScenario;
  const phaseIdx = state.currentPhase;
  const phase = scenario.phases[phaseIdx];

  if (phaseIdx >= scenario.phases.length) {
    showCompletion();
    return;
  }

  state.submitted = false;

  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  scenario.phases.forEach((p, i) => {
    const step = document.createElement('div');
    step.className = 'progress-step';
    if (i < phaseIdx) step.classList.add('done');
    if (i === phaseIdx) step.classList.add('active');
    step.innerHTML = `<div class="step-label">${p.label}</div>`;
    bar.appendChild(step);
  });

  document.getElementById('vitalHr').textContent = phase.hr || '0';
  document.getElementById('vitalBp').textContent = phase.bp || '0/0';
  document.getElementById('vitalSpo2').textContent = phase.spo2 || '0';
  document.getElementById('vitalRr').textContent = phase.rr || '0';

  const badge = document.getElementById('rhythmBadge');
  badge.textContent = phase.rhythm;
  badge.className = 'rhythm-badge';
  const isCritical = !phase.hr || phase.hr === 0;
  const isWarning = phase.hr < 50 || phase.hr > 130 || phase.spo2 < 92;
  if (isCritical && phase.hr === 0) badge.classList.add('critical');
  else if (isWarning) badge.classList.add('warning');
  else badge.classList.add('stable');

  const ecgLine = document.getElementById('ecgPolyline');
  if (ecgLine) {
    let tracingPoints = RHYTHM_TRACINGS[phase.rhythm];
    if (!tracingPoints && phase.rhythm.includes('AESP')) {
      tracingPoints = RHYTHM_TRACINGS['Bradicardia Sinusal'];
    } else if (!tracingPoints) {
      tracingPoints = RHYTHM_TRACINGS['Ritmo Sinusal'];
    }
    ecgLine.setAttribute('points', tracingPoints);
    ecgLine.setAttribute('stroke', !phase.hr || phase.hr === 0 ? '#ef4444' : '#06b6d4');
    if (phase.rhythm === 'Assistolia') {
      ecgLine.style.animation = 'none';
      ecgLine.style.strokeDasharray = 'none';
    } else {
      ecgLine.style.animation = 'drawEcgLoop 1.5s linear infinite';
      ecgLine.style.strokeDasharray = '200';
    }
  }

  document.getElementById('phaseNum').textContent = phaseIdx + 1;
  document.getElementById('phaseName').textContent = phase.label;
  const pStatus = document.getElementById('phaseStatus');
  const prevAnswer = state.answers[phaseIdx];
  if (prevAnswer !== undefined) {
    const wasCorrect = prevAnswer === true;
    pStatus.textContent = wasCorrect ? 'Correto' : 'Errado';
    pStatus.className = 'phase-status ' + (wasCorrect ? 'correct' : 'wrong');
  } else {
    pStatus.textContent = 'Aguardando';
    pStatus.className = 'phase-status pending';
  }

  document.getElementById('scenarioText').innerHTML = phase.text.replace(/\n/g, '<br>');
  document.getElementById('scenarioText').className = 'scenario-text anim-fade';

  document.getElementById('questionTitle').textContent = phase.question;

  const input = document.getElementById('answerInput');
  const prevAnsStr = state.answers[phaseIdx];
  if (prevAnsStr !== undefined && typeof prevAnsStr === 'string') {
    input.value = prevAnsStr;
  } else {
    input.value = '';
  }
  input.disabled = prevAnsStr !== undefined;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedbackTitle').textContent = '';
  document.getElementById('feedbackText').innerHTML = '';

  const hasAnswer = state.answers[phaseIdx] !== undefined;
  document.getElementById('submitBtn').style.display = hasAnswer ? 'none' : 'inline-flex';
  document.getElementById('spinner').classList.remove('active');
  document.getElementById('nextBtn').style.display = hasAnswer ? 'inline-flex' : 'none';
  document.getElementById('nextBtn').textContent = phaseIdx < scenario.phases.length - 1 ? 'Próxima Fase →' : 'Ver Resultado →';

  if (hasAnswer && typeof state.answers[phaseIdx] === 'object') {
    showAIFeedback(state.answers[phaseIdx]);
  }
}

async function submitAnswer() {
  if (!getGroqApiKey()) {
    alert('Configure sua chave de API Groq clicando no botão "API" no cabeçalho.');
    return;
  }
  const input = document.getElementById('answerInput');
  const answer = input.value.trim();
  if (!answer) {
    input.style.borderColor = 'var(--red-500)';
    setTimeout(() => { input.style.borderColor = ''; }, 1000);
    return;
  }

  const phase = state.currentScenario.phases[state.currentPhase];
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('spinner').classList.add('active');

  try {
    const result = await evaluateWithGroq(phase, answer);
    state.answers[state.currentPhase] = { answer, correct: result.correct, feedback: result.feedback, expected: result.expected };
    state.submitted = true;
    document.getElementById('spinner').classList.remove('active');
    renderPhase();
  } catch (err) {
    document.getElementById('spinner').classList.remove('active');
    document.getElementById('submitBtn').style.display = 'inline-flex';
    showFeedbackError(err);
  }
}

async function evaluateWithGroq(phase, userAnswer) {
  const correctAnswer = phase.options[phase.correct];
  const prompt = `Você é um instrutor de ACLS rigoroso avaliando a resposta de um aluno em treinamento.

CENÁRIO: ${state.currentScenario.name}
FASE: ${phase.label}
CONTEXTO CLÍNICO: ${phase.text}
PERGUNTA: ${phase.question}

RESPOSTA ESPERADA: ${correctAnswer}
RESPOSTA DO ALUNO: ${userAnswer}

Analise se a resposta do aluno está correta com base nos protocolos ACLS da American Heart Association. Considere correta se a resposta contiver a essência do tratamento correto, mesmo que em palavras diferentes.

Responda APENAS com um JSON válido no formato exato:
{"correct": true/false, "feedback": "explicação educacional detalhada em português", "expected": "resposta correta resumida"}`;

  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + getGroqApiKey(),
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: getGroqModel(),
      messages: [
        { role: 'system', content: 'Você é um instrutor de ACLS especializado em Suporte Avançado de Vida Cardiovascular. Responda SEMPRE em JSON válido. Seja rigoroso mas justo na avaliação.' },
        { role: 'user', content: prompt }
      ],
      temperature: 0.2,
      max_tokens: 1024
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error('Erro na API Groq: ' + response.status + ' - ' + errText);
  }

  const data = await response.json();
  const content = data.choices[0].message.content.trim();
  const jsonMatch = content.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Formato de resposta inesperado da IA');
  return JSON.parse(jsonMatch[0]);
}

function showAIFeedback(result) {
  const feedback = document.getElementById('feedback');
  const title = document.getElementById('feedbackTitle');
  const text = document.getElementById('feedbackText');

  feedback.className = 'feedback anim-slide ' + (result.correct ? 'correct' : 'wrong');
  title.textContent = result.correct ? '✓ Correto!' : '✗ Incorreto';
  let html = result.feedback || '';
  if (result.expected) {
    html += '<div class="expected"><strong>Resposta esperada:</strong> ' + result.expected + '</div>';
  }
  text.innerHTML = html;

  const pStatus = document.getElementById('phaseStatus');
  pStatus.textContent = result.correct ? 'Correto' : 'Errado';
  pStatus.className = 'phase-status ' + (result.correct ? 'correct' : 'wrong');
}

function showFeedbackError(err) {
  const feedback = document.getElementById('feedback');
  feedback.className = 'feedback wrong anim-slide';
  document.getElementById('feedbackTitle').textContent = '✗ Erro na IA';
  document.getElementById('feedbackText').innerHTML = 'Não foi possível avaliar sua resposta. Verifique sua chave API ou tente novamente.<br><small>' + err.message + '</small>';
}

function nextPhase() {
  const scenario = state.currentScenario;
  if (state.currentPhase >= scenario.phases.length - 1) {
    showCompletion();
  } else {
    state.currentPhase++;
    renderPhase();
    document.getElementById('simulatorPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function showCompletion() {
  document.getElementById('simulatorPanel').classList.add('panel-hidden');
  document.getElementById('completionPanel').classList.remove('panel-hidden');

  const scenario = state.currentScenario;
  const total = scenario.phases.length;
  let correctCount = 0;
  state.answers.forEach(a => {
    if (typeof a === 'object' && a.correct === true) correctCount++;
  });
  const score = Math.round((correctCount / total) * 100);

  const circle = document.getElementById('scoreCircle');
  circle.textContent = score + '%';
  circle.style.background = score >= 80 ? 'var(--green-50)' : score >= 60 ? 'var(--amber-50)' : 'var(--red-50)';
  circle.style.color = score >= 80 ? 'var(--green-600)' : score >= 60 ? 'var(--amber-600)' : 'var(--red-600)';
  circle.style.borderColor = score >= 80 ? 'var(--green-300)' : score >= 60 ? 'var(--amber-300)' : 'var(--red-300)';

  document.getElementById('completionTitle').textContent = 'Cenário ' + scenario.id + ' Concluído!';
  const msg = document.getElementById('completionMsg');
  if (score === 100) msg.textContent = 'Desempenho perfeito! Domínio completo do protocolo ACLS.';
  else if (score >= 80) msg.textContent = 'Excelente! Apenas alguns pontos para revisar.';
  else if (score >= 60) msg.textContent = 'Bom, mas revise os protocolos para melhorar.';
  else msg.textContent = 'Estude os algoritmos ACLS e tente novamente.';

  document.getElementById('scoreDetails').textContent = correctCount + ' de ' + total + ' fases corretas';

  const list = document.getElementById('resultsList');
  list.innerHTML = '';
  scenario.phases.forEach((p, i) => {
    const ans = state.answers[i];
    const correct = typeof ans === 'object' && ans.correct === true;
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `<span class="ri-name">Fase ${i+1}: ${p.label}</span>
      <span class="result-icon ${correct ? 'pass' : 'fail'}">${correct ? '✓' : '✗'}</span>`;
    list.appendChild(div);
  });

  document.getElementById('completionPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function restartScenario() {
  if (state.currentScenario) {
    state.answers = [];
    startScenario(SCENARIOS.indexOf(state.currentScenario));
  }
}

function backToSelection() {
  state.scenarioSelection = null;
  state.currentScenario = null;
  state.currentPhase = 0;
  state.answers = [];
  state.submitted = false;
  state.completed = false;

  document.getElementById('selectionPanel').classList.remove('panel-hidden');
  document.getElementById('simulatorPanel').classList.add('panel-hidden');
  document.getElementById('completionPanel').classList.add('panel-hidden');
  renderScenarioGrid();
}

renderScenarioGrid();
</script>
</body>
</html>
